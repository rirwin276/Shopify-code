name: Apply Admin Powers Cleanup V2

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-admin-powers-cleanup-v2.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch admin powers page
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path("sections/admin-powers-page.liquid")
          text = path.read_text(encoding="utf-8")

          new_permission = "\n".join(['{%- comment %}', '  2. ADMIN ACCESS CHECK', '', '  Access rules:', '  - Founder access: customer tag `super-admin` can manage every storefront.', '  - Store admin access: customer tag `storefront-admin--<shop_handle>` can manage only that storefront.', "  - Temporary safety fallback: Ryan's owner email still gets founder access until the `super-admin`", '    tag is confirmed on the live Shopify customer account.', '', '  Do not remove the email fallback until owner access has been tested through the `super-admin` tag.', '{%- endcomment -%}', "{%- assign required_admin_tag = 'storefront-admin--' | append: shop_handle -%}", "{%- assign founder_access_tag = 'super-admin' -%}", "{%- assign owner_email_fallback = 'ryan.irwin@stellaandsagecompany.com' -%}", '{%- assign is_admin_for_shop = false -%}', '{%- assign is_super_admin = false -%}', '', '{%- if customer and shop_handle != blank -%}', "  {%- assign customer_email_down = customer.email | default: '' | downcase | strip -%}", '', '  {%- if customer_email_down == owner_email_fallback -%}', '    {%- assign is_super_admin = true -%}', '    {%- assign is_admin_for_shop = true -%}', '  {%- endif -%}', '', '  {%- for t in customer.tags -%}', '    {%- assign tag_down = t | downcase | strip -%}', '', '    {%- if tag_down == founder_access_tag -%}', '      {%- assign is_super_admin = true -%}', '      {%- assign is_admin_for_shop = true -%}', '    {%- endif -%}', '', '    {%- if tag_down == required_admin_tag -%}', '      {%- assign is_admin_for_shop = true -%}', '    {%- endif -%}', '  {%- endfor -%}', '{%- endif -%}'])
          new_editor = "\n".join(['{%- comment %}', '  BACKEND + EDITOR CONFIG', '', '  Studio Uploader handles member/admin actions, store settings, sleep/wake, and store maintenance actions.', '  Printful Automation handles placement editors, custom product builders, rebuild jobs, and apply-status polling.', '', '  Editor URLs are built from a single base URL so backend changes are easier to make safely.', '{%- endcomment -%}', "{%- assign studio_uploader_base_url = 'https://studio-uploader-production.up.railway.app' -%}", "{%- assign printful_automation_base_url = 'https://printfulautomation-production.up.railway.app' -%}", '', "{%- assign editor_base_url = printful_automation_base_url | append: '/editor/bc3413' -%}", "{%- assign editor_bc3001y_base_url = printful_automation_base_url | append: '/editor/bc3001y' -%}", "{%- assign editor_nl6733_base_url = printful_automation_base_url | append: '/editor/nl6733' -%}", "{%- assign editor_mc1790_base_url = printful_automation_base_url | append: '/editor/mc1790' -%}", "{%- assign editor_m2580_base_url = printful_automation_base_url | append: '/editor/m2580' -%}", "{%- assign editor_cc1467y_base_url = printful_automation_base_url | append: '/editor/cc1467y' -%}", "{%- assign editor_bc3413_back_base_url = printful_automation_base_url | append: '/editor/bc3413_back' -%}", "{%- assign editor_pro_shirt_bc3413_base_url = printful_automation_base_url | append: '/editor/pro-shirt/bc3413' -%}", "{%- assign editor_pro_shirt_bc3001y_base_url = printful_automation_base_url | append: '/editor/pro-shirt/bc3001y' -%}", "{%- assign editor_pro_shirt_m2580_base_url = printful_automation_base_url | append: '/editor/pro-shirt/m2580' -%}", "{%- assign editor_pro_shirt_zip_hoodie_base_url = section.settings.editor_pro_shirt_zip_hoodie_base_url | default: '' -%}"])

          permission_start = "{%- comment %} 2. PERMISSIONS CHECK {% endcomment -%}"
          permission_done = "{%- comment %}\n  2. ADMIN ACCESS CHECK"
          style_marker = "{%- style -%}"

          if permission_start in text:
              start = text.index(permission_start)
              end = text.index(style_marker, start)
              text = text[:start] + new_permission + "\n\n" + text[end:]
              print("Patched permission block")
          elif permission_done in text:
              print("Permission block already patched")
          else:
              raise SystemExit("Could not find permission block")

          editor_start = "{%- comment %} BC3413 placement editor"
          editor_done = "{%- comment %}\n  BACKEND + EDITOR CONFIG"
          editor_end_line = "{%- assign editor_pro_shirt_zip_hoodie_base_url = section.settings.editor_pro_shirt_zip_hoodie_base_url | default: '' -%}"

          if editor_start in text:
              start = text.index(editor_start)
              end = text.index(editor_end_line, start) + len(editor_end_line)
              text = text[:start] + new_editor + text[end:]
              print("Patched editor config block")
          elif editor_done in text:
              print("Editor config already patched")
          else:
              raise SystemExit("Could not find editor config block")

          old_railway = 'SSAP.railwayUrl = "https://studio-uploader-production.up.railway.app";'
          new_railway = 'SSAP.railwayUrl = {{ studio_uploader_base_url | json }};'

          if old_railway in text:
              text = text.replace(old_railway, new_railway, 1)
              print("Patched railway config assignment")
          elif new_railway in text:
              print("Railway config already patched")
          else:
              raise SystemExit("Could not find railway config assignment")

          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: git rm .github/workflows/apply-admin-powers-cleanup-v2.yml

      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "Stella Sage Cleanup Bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Clean Admin Powers access and config blocks"
          git push
