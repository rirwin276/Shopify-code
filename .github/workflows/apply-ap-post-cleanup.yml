name: Apply apPost Cleanup

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch apPost helper
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('sections/admin-powers-page.liquid')
          text = path.read_text(encoding='utf-8')

          start_marker = '  async function apPost(action, payload){'
          end_marker = '  function setStatus(el, msg, type){'

          lines = [
              "  var ADMIN_ACTION_URL = (SSAP.railwayUrl || '') + '/api/admin-action';",
              "",
              "  function buildAdminActionPayload(action, payload){",
              "    return Object.assign({",
              "      action: action,",
              "      shop_handle: String(SSAP.collectionHandle || ''),",
              "      requested_by_customer_id: {{ customer.id | json }},",
              "      requested_by_email: {{ customer.email | json }}",
              "    }, payload || {});",
              "  }",
              "",
              "  async function apPost(action, payload){",
              "    if(!SSAP.railwayUrl){",
              "      throw new Error('Admin backend URL is missing.');",
              "    }",
              "",
              "    return fetch(ADMIN_ACTION_URL, {",
              "      method: 'POST',",
              "      headers: { 'Content-Type': 'application/json' },",
              "      body: JSON.stringify(buildAdminActionPayload(action, payload))",
              "    });",
              "  }",
              "",
          ]
          replacement = '\n'.join(lines)

          if 'function buildAdminActionPayload(action, payload)' in text and 'ADMIN_ACTION_URL' in text:
              print('Already patched')
          else:
              start = text.index(start_marker)
              end = text.index(end_marker, start)
              text = text[:start] + replacement + text[end:]
              path.write_text(text, encoding='utf-8')
              print('Patched apPost helper')
          PY

      - name: Remove temporary workflow
        run: git rm .github/workflows/apply-ap-post-cleanup.yml

      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "Stella Sage Cleanup Bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Clean Admin Powers apPost helper"
          git push
