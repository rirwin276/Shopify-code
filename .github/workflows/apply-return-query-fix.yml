name: Apply Return Query Fix

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-return-query-fix.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch return URL query handling
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('sections/admin-powers-page.liquid')
          text = path.read_text(encoding='utf-8')

          old = '          var _returnUrl = (window.location.origin + window.location.pathname);'
          new = '          var _returnUrl = (window.location.origin + window.location.pathname + window.location.search);'

          if new in text:
              print('already patched')
          elif old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
              print('patched')
          else:
              raise SystemExit('target line not found')
          PY

      - name: Remove temporary workflow
        run: git rm .github/workflows/apply-return-query-fix.yml

      - name: Commit patch
        run: |
          git config user.name "Stella Sage Cleanup Bot"
          git config user.email "actions@github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Preserve admin page query on editor return"
          git push
