name: Apply setStatus Guard

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/apply-set-status-guard.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch setStatus helper
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('sections/admin-powers-page.liquid')
          text = path.read_text(encoding='utf-8')

          old = '\n'.join([
              '  function setStatus(el, msg, type){',
              '    el.textContent = msg;',
              "    el.className = 'ap-status ' + (type || '');",
              '  }',
          ])
          new = '\n'.join([
              '  function setStatus(el, msg, type){',
              '    if(!el) return;',
              '    el.textContent = msg;',
              "    el.className = 'ap-status ' + (type || '');",
              '  }',
          ])

          if new in text:
              print('setStatus helper already has a missing-element guard')
          elif old in text:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
              print('Patched setStatus helper')
          else:
              raise SystemExit('Expected setStatus helper not found; refusing to patch')
          PY

      - name: Remove temporary workflow
        run: git rm .github/workflows/apply-set-status-guard.yml

      - name: Commit cleanup
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "Stella Sage Cleanup Bot"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Guard Admin Powers status helper"
          git push
