name: SS Fundraiser Step 1 Return URL Patch

on:
  push:
    branches:
      - claude/dazzling-turing-76cjur
    paths:
      - .github/workflows/ss-fundraiser-step1-return-url.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    if: ${{ github.event.head_commit.message != 'Fix fundraiser Stripe return URL' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/dazzling-turing-76cjur
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch Stripe return URL and remove one-off workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('sections/admin-powers-page.liquid')
          s = p.read_text(encoding='utf-8')
          old = "        var returnUrl = window.location.origin + window.location.pathname + '?fr_stripe=return';"
          new = """        // Preserve the existing Admin Powers query string, especially ?shop=<handle>,
        // then add the Stripe return marker. Dropping ?shop breaks store-specific
        // admin access after Stripe redirects back.
        var returnUrlObj = new URL(window.location.href);
        returnUrlObj.searchParams.set('fr_stripe', 'return');
        var returnUrl = returnUrlObj.toString();"""
          if old not in s:
              raise SystemExit('Expected Stripe returnUrl line not found')
          s = s.replace(old, new, 1)
          p.write_text(s, encoding='utf-8')

          wf = Path('.github/workflows/ss-fundraiser-step1-return-url.yml')
          if wf.exists():
              wf.unlink()
          PY

      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add sections/admin-powers-page.liquid .github/workflows/ss-fundraiser-step1-return-url.yml
          git commit -m "Fix fundraiser Stripe return URL"
          git push origin HEAD:claude/dazzling-turing-76cjur

# trigger: second push so branch-created workflow can run
